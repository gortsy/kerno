<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive SEC filing analysis from Kerno Analytics.">
  <title>Analysis — Kerno Analytics</title>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pricing.css">
  <link rel="stylesheet" href="css/enterprise.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header" id="site-header"></header>
  <script src="js/header.js" data-page="analysis"></script>

  <main id="main" class="site-main site-main--page">
    <section class="inner-hero" aria-labelledby="analysis-title">
      <div class="inner-hero__inner">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="index.html">Home</a>
          <span class="breadcrumb__sep">/</span>
          <span aria-current="page">Analysis</span>
        </nav>
        <span class="page-hero__eyebrow">Ticker analysis</span>
        <h1 id="analysis-title">Filing intelligence workspace</h1>
        <p class="page-hero__lead">
          Search tickers, curate a watchlist, and review structured cards — metrics,
          signals, and bottom-line summaries in one view.
        </p>
      </div>
    </section>

    <div class="page-body">
      <div class="workspace-controls">
        <div class="analysis-toolbar">
          <div>
            <div class="search-wrap">
              <label class="sr-only" for="ticker-search">Search ticker or company</label>
              <input type="search" id="ticker-search" class="search-input" placeholder="Search ticker or company…" autocomplete="off" spellcheck="false">
              <ul id="ticker-search-results" class="search-results" hidden></ul>
            </div>
            <div id="ticker-selector" class="ticker-selector" role="tablist" aria-label="Sample tickers"></div>
            <p class="analysis-hint">Use ← → arrow keys to switch tickers</p>
          </div>
          <div class="analysis-actions">
            <p id="analysis-meta" class="analysis-meta" aria-live="polite"></p>
            <div class="analysis-actions__btns">
              <button type="button" id="watch-btn" class="btn btn--secondary" aria-pressed="false">☆ Watchlist</button>
              <button type="button" id="copy-link-btn" class="btn btn--secondary">Copy link</button>
              <button type="button" id="export-json-btn" class="btn btn--secondary">Export</button>
            </div>
          </div>
        </div>
      </div>

      <div class="watchlist-bar">
        <span class="watchlist-bar__label">Watchlist</span>
        <div id="watchlist-chips" class="watchlist-chips"></div>
      </div>

      <div class="analysis-layout">
        <div id="ticker-card-root" aria-live="polite"></div>
        <aside class="analysis-sidebar">
          <h3>Recent filings</h3>
          <ul id="filings-list"></ul>
        </aside>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/footer.js"></script>

  <script src="js/data.js"></script>
  <script src="js/ticker-card.js"></script>
  <script src="js/interactions.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
  <script src="js/analysis.js"></script>
</body>
</html>
